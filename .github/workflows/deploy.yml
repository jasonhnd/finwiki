name: Deploy FinWiki

# Build the Astro human site and publish it together with the raw Markdown and
# AI discovery surfaces. Local build outputs and generated dependencies stay
# outside git.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install site deps
        working-directory: site
        run: bun install

      - name: Sync corpus into site
        working-directory: site
        run: bun scripts/sync-corpus.ts

      - name: Build human site
        working-directory: site
        run: bun run build

      - name: Check duplicate HTML ids
        run: python tools/check_duplicate_html_ids.py site/dist

      - name: Assemble publish dir
        run: |
          mkdir -p _site
          # 1) Expand the Astro site at the Pages root.
          cp -r site/dist/. _site/
          # 2) Copy raw Markdown and AI surfaces without overwriting Astro output.
          #    The repository root index.html is excluded because Astro owns /.
          rsync -a --ignore-existing \
            --exclude='.git' --exclude='.github' --exclude='_site' \
            --exclude='site' --exclude='node_modules' --exclude='app' \
            --exclude='.opinions' --exclude='.templates' --exclude='tools' \
            --exclude='releases' --exclude='index.html' \
            ./ _site/
          test -f _site/.nojekyll || touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
