name: Deploy FinWiki

# Build the Astro human site and publish it together with the raw Markdown and
# AI discovery surfaces. Local build outputs and generated dependencies stay
# outside git.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check wiki link graph
        run: bun run wiki:audit:ci

      - name: Install site deps
        working-directory: site
        run: bun install

      - name: Build human site
        working-directory: site
        run: bun run build

      - name: Check duplicate HTML ids
        run: bun run html:check

      - name: Build static search index
        working-directory: site
        run: bun run index:search

      - name: Assemble publish dir
        run: bun tools/assemble_static_publish.ts --out _site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        # deploy-pages@v5 currently emits an upstream DEP0040 punycode warning
        # under Node 24. Keep the latest action and suppress only deprecation
        # notices for this deploy action process.
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/deploy-pages@v5
